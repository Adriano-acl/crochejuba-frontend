<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Juba Crochê</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
</head>
<body>

  <div class="login-box">

    <div class="login-logo">
      <h1>Juba Crochê</h1>
      <p>Painel Administrativo</p>
    </div>

    <div class="campo">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com">
    </div>

    <div class="campo">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="••••••••">
    </div>

    <button class="btn-entrar" id="btnLogin">Entrar</button>

  </div>

  <script src="script.js"></script>

</body>
</html>
